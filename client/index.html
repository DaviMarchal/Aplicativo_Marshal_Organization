<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Só usado no deploy web (Netlify + backend em host separado). Deixe
       vazio pro app desktop/dev — "" cai no padrão relativo "/api", que já
       funciona porque ali front e API são o mesmo servidor. -->
  <meta name="api-base" content="https://aplicativo-marshal-organization.onrender.com/api" />
  <title>Marshal Organization</title>

  <link rel="stylesheet" href="/vendor/fonts/inter/index.css" />
  <link rel="stylesheet" href="/vendor/fonts/jetbrains-mono/index.css" />
  <link rel="stylesheet" href="/css/output.css" />
  <link rel="stylesheet" href="/css/animations.css" />
</head>
<body class="bg-bg-900 text-text-hi">
  <!-- Splash de boot: cobre a tela com o mesmo fundo escuro do app até o JS
       terminar o primeiro render, pra não deixar aparecer o shell vazio
       (sidebar sem largura, header/main em branco) por um instante. Puro
       HTML/CSS — pinta antes de qualquer módulo JS carregar. Removido por
       app.js depois do primeiro renderRoute(). -->
  <div id="boot-splash" class="fixed inset-0 z-[999] flex items-center justify-center bg-bg-900">
    <div class="w-14 h-14 rounded-2xl glow-icon flex items-center justify-center font-bold text-xl breathe"
         style="background:linear-gradient(160deg, #afdef5, #2d96cd); color:#ffffff;">M</div>
  </div>

  <!-- Mesh gradient de fundo — presente em todas as páginas, atrás de tudo -->
  <div class="mesh-bg"><span></span><span></span><span></span></div>

  <!-- Tela de login/cadastro — só aparece no modo web (MULTI_USER=true) sem
       sessão válida. Fica fora de #shell pra não montar sidebar/header à
       toa; app.js decide qual dos dois mostrar depois do boot. -->
  <div id="auth-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4"></div>

  <!-- Pergunta o nome numa instalação nova do app desktop (banco embutido
       recém-criado, sem nome definido ainda). Ver client/js/pages/first-run.js. -->
  <div id="first-run-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4"></div>

  <div id="shell" class="flex h-screen overflow-hidden">
    <!-- Backdrop do menu em telas pequenas — sidebar vira um drawer que
         desliza por cima do conteúdo (não empurra), fecha ao tocar fora. -->
    <div id="sidebar-backdrop" class="hidden fixed inset-0 z-30 bg-black/50 md:hidden"></div>

    <!-- Sidebar montada via JS (components/sidebar.js). Em telas < md fica
         fixa fora da tela (-translate-x-full) até #menu-toggle abrir. -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-40 shrink-0 h-full border-r border-stroke bg-bg-800/95 md:bg-bg-800/60 backdrop-blur-card shadow-[4px_0_24px_rgba(0,0,0,0.25)] overflow-hidden -translate-x-full md:translate-x-0 transition-transform md:transition-[width] duration-300 ease-out"></aside>

    <div class="flex-1 flex flex-col min-w-0">
      <!-- Barra fixa só em telas pequenas — não é sobrescrita pelo header de
           cada página (que troca de conteúdo o tempo todo via setHeader()),
           então o botão de abrir o menu sempre fica disponível. -->
      <div class="md:hidden shrink-0 flex items-center gap-3 px-4 pt-4">
        <button type="button" id="menu-toggle" aria-label="Abrir menu"
                class="btn-ghost w-9 h-9 rounded-lg flex items-center justify-center text-text-hi shrink-0">
          <span class="w-[18px] h-[18px]">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </span>
        </button>
        <div class="flex items-center gap-2 min-w-0">
          <div class="w-6 h-6 shrink-0 rounded-lg glow-icon flex items-center justify-center font-bold text-[11px]"
               style="background:linear-gradient(160deg, #afdef5, #2d96cd); color:#ffffff;">M</div>
          <span class="font-semibold text-text-hi text-sm truncate">Marshal Organization</span>
        </div>
      </div>

      <!-- Header montado via JS (app.js) -->
      <header id="page-header" class="shrink-0 px-4 pt-5 pb-3 md:px-8 md:pt-8 md:pb-4"></header>

      <!-- Conteúdo da página ativa -->
      <main id="app" class="flex-1 overflow-y-auto px-4 pb-6 md:px-8 md:pb-10"></main>
    </div>
  </div>

  <!-- Roots de overlay -->
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-5 left-5 right-5 sm:left-auto z-[100] flex flex-col gap-2 items-stretch sm:items-end"></div>

  <!-- Bibliotecas locais (offline-first, sem CDN) -->
  <script src="/vendor/chart.js/chart.umd.js"></script>
  <script src="/vendor/gsap/gsap.min.js"></script>
  <script src="/vendor/sortablejs/Sortable.min.js"></script>
  <script src="/vendor/canvas-confetti/confetti.browser.js"></script>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
